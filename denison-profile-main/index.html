        <style>
    .card {
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .modal-overlay {
        display: flex;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.6);
        z-index: 2000;
        justify-content: center;
        align-items: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
    }

    .modal-overlay.active {
        opacity: 1;
        pointer-events: auto;
    }

    .modal-content {
        background: white;
        padding: 40px;
        border-radius: 8px;
        max-width: 600px;
        width: 90%;
        position: relative;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        transform: translateY(-20px);
        transition: transform 0.3s ease;
        text-align: center;
    }

    .modal-overlay.active .modal-content {
        transform: translateY(0);
    }

    .modal-content h3 {
        margin-bottom: 15px;
        color: #2980b9;
        font-size: 1.8rem;
    }

    .modal-content p {
        font-size: 1.2rem;
    }

    .modal-content img {
        max-width: 100%;
        border-radius: 8px;
        margin-bottom: 15px;
    }
    </style>

    <script>
    document.addEventListener("DOMContentLoaded", function() {
        var modalOverlay = document.createElement("div");
        modalOverlay.className = "modal-overlay";
        modalOverlay.innerHTML = '<div class="modal-content" id="modal-content"></div>';
        document.body.appendChild(modalOverlay);

        var modalContent = modalOverlay.querySelector(".modal-content");
        var cards = document.querySelectorAll(".card");

        for (var i = 0; i < cards.length; i++) {
            cards[i].addEventListener("click", function() {
                var title = this.querySelector("h3");
                var desc = this.querySelector("p");
                
                var titleText = title ? title.innerHTML : "Услуга";
                var descText = desc ? desc.innerHTML : "Описание";
                
                modalContent.innerHTML = '<img src="https://panlib.ru/media/content_image/14/20/1565547206604f7e522b06c.jpeg"' + encodeURIComponent(titleText) + '" alt="' + titleText + '">' +
                    '<h3>' + titleText + '</h3>' +
                    '<p>' + descText + '</p>' +
                    '<p>Свяжитесь со мной для подробностей</p>';
                
                modalOverlay.classList.add("active");
            });
        }

        modalOverlay.addEventListener("click", function(event) {
            if (event.target === modalOverlay) {
                modalOverlay.classList.remove("active");
            }
        });
    });
    </script>
