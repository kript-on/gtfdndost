     <script>
  // Получаем текущее количество побед из памяти. Если значения нет, устанавливаем 0
  // Поскольку localStorage отдает строку, используем parseInt для перевода в число
  let die = parseInt(localStorage.getItem("quest2Die")) || 0;

  // Увеличиваем показатель побед на 1
  die += 1;

  // Перезаписываем обновленное число обратно в localStorage
  localStorage.setItem("quest2Die", die);
</script>
 
    <!-- Тег audio загружает звуковой файл. 
     Атрибут loop заставляет музыку играть по кругу. 
     Атрибут id нужен, чтобы мы могли обращаться к элементу из JavaScript -->
