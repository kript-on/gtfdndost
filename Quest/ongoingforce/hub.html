<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>where am i</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div style="width: 100%; background-color: #555; border-radius: 10px; margin-bottom: 20px;">
            <div id="hpBar" style="width: 100%; height: 20px; background-color: #32CD32; border-radius: 10px; transition: width 0.3s; text-align: center; color: white; font-size: 14px; font-weight: bold; line-height: 20px;">100%</div>
        </div>
        <h1>hab</h1>
        <p>
            <img src="https://media.rawg.io/media/resize/640/-/screenshots/2d4/2d42ff888b242347b68e6aafcb01d407.jpg" width="600">
            вы приходите в хаб этого этажа. перед вами забарикадированный проход к лифтам, за ним слышны крики множества зомби
        </p>
        <div class="choices">
            <!-- Кнопка "обыскать труп охранника" — появляется, если рации НЕТ -->
            <a href="barny.html" class="choice" id="secretDoorBtn" style="display: none;">
                <img src="https://static.wikia.nocookie.net/halflife/images/f/fb/Barneyhl2.JPG/revision/latest?cb=20101203153013&path-prefix=ru" alt="коридор">
                <span>обыскать труп охранника</span>
            </a>
            <!-- Кнопка "пойти в комнату оповещения" — всегда видна -->
            <a href="alarm_room.html" class="choice">
                <img src="https://i.redd.it/o8my3ej96vda1.png" alt="баня">
                <span>пойти в комнату оповещения</span>
            </a>

            <a href="smertvnishite.html" class="choice" id="dangerBtn" style="display: none;">
                <img src="https://i.playground.ru/i/pix/2549199/image.jpg" alt="опасно">
                <span>нажать подозрительную кнопку на рации</span>
            </a>
        </div>
    </div>
    <audio id="bgMusic" loop>
        <source src="last.mp3" type="audio/mpeg">
    </audio>
    <button id="muteBtn" class="mute-button">🔇 Звук выключен</button>
    <script src="script.js"></script>
    <script>
        // Если рации нет — показываем кнопку охранника
        if (!hasItem('рация')) {
            document.getElementById('secretDoorBtn').style.display = 'flex';
        }
        // Если рация есть — показываем новую кнопку в тёмную нишу
        if (hasItem('рация')) {
            document.getElementById('dangerBtn').style.display = 'flex';
        }
    </script>
</body>
</html>
