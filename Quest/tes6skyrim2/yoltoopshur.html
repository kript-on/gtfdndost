<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Огненное дыхание</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>Огненное дыхание</h1>
        <p>
            <img src = "https://avatars.dzeninfra.ru/get-zen_doc/271828/pub_67fccfdef4e06446e6c2e41b_67fccfdff4e06446e6c2e634/scale_1200" width="600">
            огонь невредимо касается шкуры дракона, после секундной паузы он заливается смехом и вы убегаете. возможно вы не достойный сладкого рулета... </p>
        <div class="choices">
            <a href="../index.html" class="choice">
                <img src="https://avatars.mds.yandex.net/i?id=5d6776f909b1d90639da8480d6584dc9_l-5873671-images-thumbs&n=13" alt="Начать заново" width="300">
                <span>Начать заново</span>
        </div>
    </div>
    <!-- Тег audio загружает звуковой файл. 
     Атрибут loop заставляет музыку играть по кругу. 
     Атрибут id нужен, чтобы мы могли обращаться к элементу из JavaScript -->
<audio id="bgMusic" loop>
  <source
    src="KOLENO.mp3"
    type="audio/mpeg"
  />
</audio>

<!-- Кнопка для управления звуком. По умолчанию звук считаем выключенным до действий пользователя -->
<button id="muteBtn" class="mute-button">🔇 Звук выключен</button>

<!-- Подключаем наш будущий файл с логикой JavaScript -->
 <script src="script.js"></script>

</body>

</html>
