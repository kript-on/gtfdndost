<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Загадка Стража</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>Загадка Стража</h1>
        <p>
            <img src = "https://i.pinimg.com/originals/e7/c8/f5/e7c8f5f7513c183e6a4c361effcdb428.jpg" width="600">
            Ты бесшумно заходишь  в баню, парящийся стражник не очень этому рад.</p>
        <div class="choices">
            
            
            <a href="../index.html" class="choice">
                <img src="https://media1.tenor.com/m/kNJbDm0T7rUAAAAC/tom-tom-and-jerry.gif" >
                <span>вы не приходите в себя через несколько дней</span>
            </a>
        </div>
    </div>

    <script>
  // Получаем текущее количество побед из памяти. Если значения нет, устанавливаем 0
  // Поскольку localStorage отдает строку, используем parseInt для перевода в число
  let die = parseInt(localStorage.getItem("questDie")) || 0;

  // Увеличиваем показатель побед на 1
  die += 1;

  // Перезаписываем обновленное число обратно в localStorage
  localStorage.setItem("questDie", die);
</script>

    <!-- Тег audio загружает звуковой файл. 
     Атрибут loop заставляет музыку играть по кругу. 
     Атрибут id нужен, чтобы мы могли обращаться к элементу из JavaScript -->
<audio id="bgMusic" loop>
  <source
    src="KOLENO.mp3"
    type="audio/mpeg"
  />
</audio>

<!-- Кнопка для управления звуком. По умолчанию звук считаем выключенным до действий пользователя -->
<button id="muteBtn" class="mute-button">🔇 Звук выключен</button>

<!-- Подключаем наш будущий файл с логикой JavaScript -->
 <script src="script.js"></script>

</body>

</html>
