<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>баня</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="containerbup">
        <h1>баня</h1>
        <p>
            <img src = "https://i.playground.ru/i/pix/2549199/image.jpg" width="600">
            подходя к бане  ты слышишь шорох в кустах, ты можешь кинуть в них камень или войти в баню</p>
        <div class="choices">
            <a href="intothepit.html" class="choice">
                <img src="http://avatars.mds.yandex.net/get-vthumb/2827820/19461eda251e716f7da8fa816cc42c01/800x450" alt="Тихо идти по мосту">
                <span>Тихо идти в баню</span>
            </a>
            <a href="dragon.html" class="choice">
                <img src="https://avatars.mds.yandex.net/i?id=d472ebaba7e33f8bc4968739a44dd79a_l-9106685-images-thumbs&n=13text=Кинуть+камень"
                    alt="Кинуть камень в пропасть">
                <span>Кинуть камень в кусты</span>
            </a>
        </div>
    </div>

    <!-- Тег audio загружает звуковой файл. 
     Атрибут loop заставляет музыку играть по кругу. 
     Атрибут id нужен, чтобы мы могли обращаться к элементу из JavaScript -->
<audio id="bgMusic" loop>
  <source
    src="KOLENO.mp3"
    type="audio/mpeg"
  />
</audio>

<!-- Кнопка для управления звуком. По умолчанию звук считаем выключенным до действий пользователя -->
<button id="muteBtn" class="mute-button">🔇 Звук выключен</button>

<!-- Подключаем наш будущий файл с логикой JavaScript -->
 <script src="script.js"></script>

</body>

</html>
