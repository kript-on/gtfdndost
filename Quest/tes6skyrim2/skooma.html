<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>"Благодарность" гоблина</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>Благодарность гоблина</h1>
        
        <p>
            <img src = "https://i.playground.ru/i/pix/551220/image.jpg" width="600">
            вам больше не нужен сладкий рулет....</p>
        <div class="choices">
            <a href="main.html" class="choice">
                <img src="https://media1.tenor.com/m/kNJbDm0T7rUAAAAC/tom-tom-and-jerry.gif" >
                <span>когда скума кончается в вас просыпается тяга к сладким рулетам... возможно они связаны</span>
            </a>
        </div>
    </div>
    <!-- Тег audio загружает звуковой файл. 
     Атрибут loop заставляет музыку играть по кругу. 
     Атрибут id нужен, чтобы мы могли обращаться к элементу из JavaScript -->
<audio id="bgMusic" loop>
  <source
    src="KOLENO.mp3"
    type="audio/mpeg"
  />
</audio>

<!-- Кнопка для управления звуком. По умолчанию звук считаем выключенным до действий пользователя -->
<button id="muteBtn" class="mute-button">🔇 Звук выключен</button>

<!-- Подключаем наш будущий файл с логикой JavaScript -->
 <script src="script.js"></script>

</body>

</html>
