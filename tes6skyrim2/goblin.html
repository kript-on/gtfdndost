<body>
    <div class="container">
        <h1>Благодарность гоблина</h1>
        
        <p>
            <img src = "https://avatars.mds.yandex.net/i?id=66a3bcf0215b8d324d386ed2c03648a0_l-5419788-images-thumbs&n=13" width="600">
            Ты перевязываешь гоблину рану и отпугиваешь волков. благодарный гоблин даёт тебе карту ведушую к сладкому рулету... по пути к башне хранящей рулет вы видите в лесу бутылочку скумы</p>
        <div class="choices">
            <a href="victory.html" class="choice">
                <img src="https://avatars.mds.yandex.net/i?id=51f2fe4ea86214ab2c0648a22674a692_l-4598782-images-thumbs&n=13text=Башня" alt="Башня">

    <!-- Тег audio загружает звуковой файл. 
     Атрибут loop заставляет музыку играть по кругу. 
     Атрибут id нужен, чтобы мы могли обращаться к элементу из JavaScript -->
<audio id="bgMusic" loop>
  <source
    src="KOLENO.mp3"
    type="audio/mpeg"
  />
</audio>

<!-- Кнопка для управления звуком. По умолчанию звук считаем выключенным до действий пользователя -->
<button id="muteBtn" class="mute-button">🔇 Звук выключен</button>

<!-- Подключаем наш будущий файл с логикой JavaScript -->
 <script src="script.js"></script>

</body>

</html>
