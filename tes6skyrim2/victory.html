<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Осколок Звезды</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>сладкий рулет</h1>
        <p>
            <img src = "https://staticdelivery.nexusmods.com/mods/110/images/headers/106891_1615005851.jpg" width="600">

            Ты проходишь последнее испытание. Перед тобой на столе сладкий рулет, излучающий мягкий золотой свет.
            Ты берешь его в руки, и чувствуешь невероятную энергию. Твое желание исполнено
        </p>
        <div class="choices">
            <a href="../index.html" class="choice">
                <img src="https://avatars.mds.yandex.net/i?id=2f718befefbe389250d0a81c5fe7522d_l-12636876-images-thumbs&n=13" alt="Играть снова">
                <span>Играть снова</span>
            </a>
        </div>
    </div>
    <script>
  // Получаем текущее количество побед из памяти. Если значения нет, устанавливаем 0
  // Поскольку localStorage отдает строку, используем parseInt для перевода в число
  let wins = parseInt(localStorage.getItem("questWins")) || 0;

  // Увеличиваем показатель побед на 1
  wins += 1;

  // Перезаписываем обновленное число обратно в localStorage
  localStorage.setItem("questWins", wins);
</script>
    <!-- Тег audio загружает звуковой файл. 
     Атрибут loop заставляет музыку играть по кругу. 
     Атрибут id нужен, чтобы мы могли обращаться к элементу из JavaScript -->
<audio id="bgMusic" loop>
  <source
    src="KOLENO.mp3"
    type="audio/mpeg"
  />
</audio>

<!-- Кнопка для управления звуком. По умолчанию звук считаем выключенным до действий пользователя -->
<button id="muteBtn" class="mute-button">🔇 Звук выключен</button>

<!-- Подключаем наш будущий файл с логикой JavaScript -->
 <script src="script.js"></script>

</body>

</html>
