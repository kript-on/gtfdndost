    <!-- Тег audio загружает звуковой файл. 
     Атрибут loop заставляет музыку играть по кругу. 
     Атрибут id нужен, чтобы мы могли обращаться к элементу из JavaScript -->

  <source
    src="last.mp3"
    type="audio/mpeg"
  />
</audio>

<!-- Кнопка для управления звуком. По умолчанию звук считаем выключенным до действий пользователя -->

<!-- Подключаем наш будущий файл с логикой JavaScript -->
 <script src="script.js"></script>




 <script>
  const timerText = document.getElementById("timerText");
  let timeLeft = 5; // Время в секундах
 
  // setInterval вызывает указанную функцию каждый 1000 миллисекунд (1 секунду)
  const countdown = setInterval(() => {
    timeLeft--; // Уменьшаем время на 1
    timerText.innerText = timeLeft; // Показываем на экране
 
    // Если время вышло
    if (timeLeft <= 0) {
      clearInterval(countdown); // Останавливаем работу таймера, чтобы не ушел в минус
    window.location.href = 'zombi.html';
    }
  }, 1000); // 1000 мс = 1 секунда
</script>

</body>
