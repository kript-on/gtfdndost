<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>where am i</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div style="width: 100%; background-color: #555; border-radius: 10px; margin-bottom: 20px;">
            <div id="hpBar" style="width: 100%; height: 20px; background-color: #32CD32; border-radius: 10px; transition: width 0.3s; text-align: center; color: white; font-size: 14px; font-weight: bold; line-height: 20px;">100%</div>
        </div>
        <h1>hab</h1>
        <p>
            <img src="https://i.redd.it/o8my3ej96vda1.png" width="600">
            🚨 Сирена включена! Через <span id="timer">5</span>  вы слышите приблежение толпы
        </p>
        <div class="choices" id="extraChoice" style="display: none;">
            <a href="lest.html" id="escapeLink" class="choice">
                <img src="https://i.playground.ru/i/pix/2549199/image.jpg" >
                <span> вы прячитесь в вентеляции и нажимаете кнопку на "рации"</span>
            </a>
        </div>
    </div>
    <audio id="bgMusic" loop>
        <source src="last.mp3" type="audio/mpeg">
    </audio>
    <button id="muteBtn" class="mute-button">🔇 Звук выключен</button>
    <script src="script.js"></script>
    <script>
        let secondsLeft = 5;
        const timerSpan = document.getElementById('timer');
        let intervalId = null;
        let timeoutId = null;

        function startTimer() {
            intervalId = setInterval(() => {
                secondsLeft--;
                timerSpan.textContent = secondsLeft;
                if (secondsLeft <= 0) {
                    clearInterval(intervalId);
                    if (timeoutId) clearTimeout(timeoutId);
                    window.location.href = 'dead.html';
                }
            }, 1000);
            timeoutId = setTimeout(() => {}, 5000);
        }

        // Проверяем наличие рации (используем ваш hasItem)
        if (hasItem('рация')) {
            const extraDiv = document.getElementById('extraChoice');
            extraDiv.style.display = 'flex';  // показываем кнопку спасения
            document.getElementById('escapeLink').addEventListener('click', function(e) {
                // Останавливаем таймеры, чтобы не умереть при переходе
                if (intervalId) clearInterval(intervalId);
                if (timeoutId) clearTimeout(timeoutId);
            });
        }
        startTimer();
    </script>
</body>
</html>
